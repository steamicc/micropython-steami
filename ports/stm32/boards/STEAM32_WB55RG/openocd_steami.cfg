# This script configures OpenOCD for use with an STM32 F103 DapLink programmer/debugger
# and an STM32WB55 target microcontroller.
#
# To flash your firmware:
#
#    $ openocd -f openocd_steami.cfg \
#        -c "stm_flash build-BOARD/firmware0.bin 0x08000000 build-BOARD/firmware1.bin 0x08004000"
#
# For a gdb server on port 3333:
#
#    $ openocd -f openocd_steami.cfg


source [find interface/cmsis-dap.cfg]

transport select swd

set CHIPNAME STM32WB55RG
set ENABLE_LOW_POWER 1
set STOP_WATCHDOG 1
set CLOCK_FREQ 4000

source [find target/stm32wbx.cfg]
reset_config srst_only
init

proc stm_flash { BIN0 ADDR0 {BIN1 ""} {ADDR1 ""} } {
    reset halt
    sleep 100
    wait_halt 2
    flash write_image erase $BIN0 $ADDR0
    sleep 100
    verify_image $BIN0 $ADDR0
    sleep 100
    if {$BIN1 ne ""} {
        flash write_image erase $BIN1 $ADDR1
        sleep 100
        verify_image $BIN1 $ADDR1
        sleep 100
    }
    reset run
    shutdown
}

proc stm_erase {} {
    reset halt
    sleep 100
    stm32wbx mass_erase 0
    sleep 100
    shutdown
}
